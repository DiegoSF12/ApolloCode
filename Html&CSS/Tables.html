<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/Tables.css">
    <title>Tabelas</title>
</head>
<body>
    <h1>Exemplos em tabelas</h1>
    <div>
        <table>
            <caption>Linguagens de programação mais utilizadas em 2026</caption>
            <thead>    
                <tr>
                <th>Nome</th>
                <th>Porcentagem</th> 
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Python</td>
                    <td>26.84%</td>
                </tr>
                <tr>
                    <td>Java</td>
                    <td>20.36%</td>
                </tr>
                <tr>
                    <td colspan="2">Cobol</td>
                </tr>
                <tr>
                    <td>JavaScript</td>
                    <td>8.25%</td>
                </tr>
                <tr>
                    <td>C#</td>
                    <td>7.32%</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <td>Total</td>
                    <td>62.77%</td>
                </tr>
            </tfoot>
        </table>
    </div>
</body>
</html>
