<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensando HTML</title>
    <style>
        #div01{
            width: 180px;
            height:120px;
            background-color: yellow;
        }
        #div02{
            width:60px;
            height: 60px;
            background-color: red;
            float: left;

        }
        #div03{
            width:60px;
            height: 60px;
            background: orange;
            float: left;
        }
        #div04{
            width:60px;
            height: 60px;
            background: brown;
            float: left;
        }
        #div05{
            width: 120px;
            height: 60px;
            background: green;
            float: left;
            text-align: center;
        }
        #div06{
            width: 60px;
            height:60px;
            background: purple;
            float: left;
        }
    </style>
</head>
<body>
    <div id="div01">
        <div id="div02">
        </div>

        <div id="div03">
        </div>

        <div id="div04">
        </div>

        <div id="div05">
            <p><strong>Lorem Ipsum</strong></p>
        </div>

        <div id="div06">
        </div>
    </div>
</body>
</html>
