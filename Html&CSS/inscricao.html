<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../assets/css/atividades.css">
    <title>Inscrições</title>
</head>
<body>
    <header>
        <h1>Formulário de inscrições</h1>
        <p>Preencha o formulario a seguir com suas informções de contato para realizar a inscrição no curso</p>
    </header>
    <main>
        <section>
            <form>
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" placeholder="Primeiro nome">

                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">

                <br>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" 
                placeholder="E-mail" required>

                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" placeholder="Telefone">
                
                <br>

                <input class="enviar" type="submit" value="Enviar">
            </form>
    </main>
</body>
</html>
